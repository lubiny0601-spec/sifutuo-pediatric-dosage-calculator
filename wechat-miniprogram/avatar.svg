<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <!-- Electric Blue & Cyan Shield Gradient -->
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f2fe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4facfe;stop-opacity:1" />
    </linearGradient>
    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Base (Rounded Card style) -->
  <rect x="0" y="0" width="200" height="200" rx="40" fill="url(#bgGrad)" />

  <!-- Outer Glowing Ring -->
  <circle cx="100" cy="100" r="75" fill="none" stroke="#00f2fe" stroke-width="2" opacity="0.4" filter="url(#glow)" />
  <circle cx="100" cy="100" r="70" fill="none" stroke="#4facfe" stroke-width="1" opacity="0.3" />

  <!-- Stylized Shield -->
  <g filter="url(#glow)">
    <path d="M100 45 C120 45 140 37 150 42 C150 78 140 120 100 155 C60 120 50 78 50 42 C60 37 80 45 100 45 Z" 
          fill="none" stroke="url(#shieldGrad)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
  </g>

  <!-- Cross / Pill Element -->
  <rect x="94" y="60" width="12" height="80" rx="6" fill="#00f2fe" opacity="0.2" transform="rotate(45 100 100)" />
  <rect x="94" y="60" width="12" height="80" rx="6" fill="#00f2fe" opacity="0.2" transform="rotate(-45 100 100)" />

  <!-- Stylized "妥" text -->
  <text x="100" y="117" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="52" font-weight="900" 
        fill="#ffffff" text-anchor="middle" letter-spacing="0">妥</text>

  <!-- Highlight dot -->
  <circle cx="130" cy="75" r="4" fill="#00f2fe" filter="url(#glow)" />
</svg>
